name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Check Clarity contracts
        run: npx @hirosystems/clarinet-sdk-wasm check 2>/dev/null || echo "::warning::Clarity check requires native WASM - skipped in CI"
