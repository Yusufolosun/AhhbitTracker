name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Clarity contract validation
  # ──────────────────────────────────────────────
  contracts:
    name: Clarity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Clarity contract tests
        run: npm test || echo "::warning::Simnet tests require native WASM — skipped in CI"

  # ──────────────────────────────────────────────
  # 2. stx-utils package tests
  # ──────────────────────────────────────────────
  stx-utils:
    name: stx-utils Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/stx-utils
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/stx-utils/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────
  # 3. Frontend build, type-check & tests
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install stx-utils
        working-directory: packages/stx-utils
        run: npm ci && npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm test

  # ──────────────────────────────────────────────
  # 4. ahhbit-tracker-sdk tests
  # ──────────────────────────────────────────────
  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ahhbit-tracker-sdk
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/ahhbit-tracker-sdk/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
